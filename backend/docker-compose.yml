version: "3.9"

services:
  db:
    image: mysql:8
    container_name: jarvis-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jarvis_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: jarvis-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      sh -c "
      echo 'Waiting for MySQL...';
      sleep 10;
      uvicorn main:app --host 0.0.0.0 --port 8000
      "

volumes:
  mysql_data: